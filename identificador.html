<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identificador Técnico - Stock v2</title>
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236366f1' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M6 18h8'/%3E%3Cpath d='M3 22h18'/%3E%3Cpath d='M14 22a7 7 0 1 0 0-14h-1'/%3E%3Cpath d='M9 14h2'/%3E%3Cpath d='M9 12a2 2 0 1 1-2-2V6h6v4.16'/%3E%3Cpath d='m12 8-2 2'/%3E%3C/svg%3E">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; }
    </style>
</head>
<body class="h-full font-sans bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 transition-colors duration-300">
    <header class="sticky top-0 z-30 bg-white/70 backdrop-blur-xl border-b border-slate-200 dark:bg-slate-950/70 dark:border-slate-800 h-20">
        <div class="max-w-5xl mx-auto px-4 h-full flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="index.html" class="group p-2 rounded-xl hover:bg-indigo-50 dark:hover:bg-slate-800 transition-all flex items-center gap-2 text-slate-400 hover:text-indigo-600">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                </a>
                <h1 class="text-xl font-black tracking-tighter flex items-center gap-2">
                    <i data-lucide="microscope" class="w-6 h-6 text-indigo-500"></i>
                    STOCK TECH <span class="text-indigo-500">v2</span>
                </h1>
            </div>
            
            <!-- Simple Theme Toggle -->
            <button onclick="toggleTheme()" class="p-2 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                <i data-lucide="moon" class="w-5 h-5 dark:hidden"></i>
                <i data-lucide="sun" class="w-5 h-5 hidden dark:block text-amber-400"></i>
            </button>
        </div>
    </header>

    <div class="max-w-5xl mx-auto p-4 sm:p-6 lg:p-8">
        <!-- Search Area -->
        <div class="bg-white dark:bg-slate-900 p-8 rounded-[2rem] border border-slate-200 dark:border-slate-800 shadow-xl shadow-slate-200/50 dark:shadow-none mb-10">
            <h2 class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-6">Módulo de Engenharia de Materiais</h2>
            <div class="flex flex-col sm:flex-row gap-4">
                <div class="relative flex-1">
                    <i data-lucide="search" class="absolute left-4 top-4 w-5 h-5 text-slate-400"></i>
                    <input type="text" id="searchInput" class="w-full pl-12 pr-12 py-4 bg-slate-50 dark:bg-slate-800 border-none rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 dark:text-white transition-all text-lg" placeholder="Digite código ou norma (ex: AI304, 1045)...">
                    <button id="clearSearch" class="hidden absolute right-4 inset-y-0 flex items-center text-red-500 hover:text-red-600 transition-colors" title="Limpar busca">
                        <i data-lucide="x" class="w-6 h-6"></i>
                    </button>
                </div>
                <button onclick="identify()" class="px-10 py-4 bg-indigo-600 text-white rounded-2xl font-black uppercase tracking-tighter hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-500/20 active:scale-95">
                    Analisar
                </button>
            </div>
        </div>

                <!-- Result Card -->
                <div id="resultCard" class="hidden bg-white dark:bg-slate-900 p-8 rounded-2xl border-l-8 border-indigo-500 shadow-xl mb-8 animate-in fade-in slide-in-from-bottom-4">
                    <div class="flex justify-between items-start mb-6">
                        <h3 class="text-[10px] font-black uppercase tracking-widest text-indigo-500">Resultado da Identificação</h3>
                        <span class="px-3 py-1 bg-indigo-500 text-white text-[10px] font-black rounded-full">ENCONTRADO</span>
                    </div>
                    <div id="resultType" class="text-4xl font-black text-slate-900 dark:text-white mb-2 tracking-tighter"></div>
                    <div id="resultDesc" class="text-indigo-600 dark:text-indigo-400 mb-6 font-bold text-lg"></div>
                    <div id="resultBadges" class="flex flex-wrap gap-2"></div>
                </div>

                <!-- Biblioteca de Normas -->
                <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 overflow-hidden shadow-sm">
                    <div class="p-4 border-b border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-800/50">
                        <h3 class="font-bold text-slate-800 dark:text-slate-200 flex items-center gap-2 text-sm uppercase tracking-wider">
                            <i data-lucide="list" class="w-4 h-4"></i> Biblioteca de Normas
                        </h3>
                    </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left text-xs">
                                <thead class="bg-slate-50 dark:bg-slate-800/30 text-slate-400 font-black border-b border-slate-100 dark:border-slate-700 uppercase tracking-widest">
                                    <tr>
                                        <th class="px-6 py-4">Cód.</th>
                                        <th class="px-6 py-4">Material</th>
                                        <th class="px-6 py-4">Norma Técnica</th>
                                        <th class="px-6 py-4">Aplicação</th>
                                    </tr>
                                </thead>
                                <tbody id="refTable" class="divide-y divide-slate-100 dark:divide-slate-800"></tbody>
                            </table>
                        </div>
                </div>
    </div>

    <!-- Modal de Erro Padrão -->
    <div id="errorModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm transition-all duration-300 opacity-0">
        <div id="errorModalContent" class="bg-white dark:bg-slate-900 rounded-[2.5rem] shadow-2xl max-w-sm w-full overflow-hidden transform scale-95 transition-transform duration-300">
            <div class="p-8 text-center">
                <div class="mx-auto mb-6 w-20 h-20 rounded-3xl flex items-center justify-center bg-red-50 text-red-500 dark:bg-red-900/20 dark:text-red-400">
                    <i data-lucide="search-x" class="w-10 h-10"></i>
                </div>
                <h3 class="text-xl font-black text-slate-900 dark:text-white mb-2 tracking-tight uppercase">Não Identificado</h3>
                <p class="text-sm text-slate-500 dark:text-slate-400 mb-8 leading-relaxed font-medium">Nenhum padrão técnico correspondente foi encontrado para o termo pesquisado na biblioteca.</p>
                
                <button onclick="closeErrorModal()" class="w-full py-4 rounded-2xl bg-indigo-600 text-white font-black uppercase tracking-tighter transition-all hover:bg-indigo-700 active:scale-95 shadow-lg shadow-indigo-500/20">
                    Entendido
                </button>
            </div>
        </div>
    </div>

<script>
const MATERIALS = [
  { type: "Aço Inoxidável Austenítico 304", codes: ["AI304", "A304", "AISI304", "304L"], norm: "ABNT NBR 6648 / AISI 304", application: "Conexões sanitárias, flanges, parafusos, correntes, válvulas", color: "bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400", keywords: ["inox", "304", "aisi304", "a304", "ai304"] },
  { type: "Aço Inoxidável Austenítico 316 / 316L", codes: ["AI316", "A316", "AISI316", "AI316L", "A316L"], norm: "ABNT NBR / AISI 316", application: "Conexões químicas, flanges, parafusos", color: "bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400", keywords: ["316", "ai316", "a316", "316l", "ai316l"] },
  { type: "Aço Carbono 1020", codes: ["A1020", "AC1020", "1020"], norm: "ABNT NBR 6646 / SAE 1020", application: "Roletes, correntes, barras", color: "bg-orange-100 text-orange-700 dark:bg-orange-900/30 dark:text-orange-400", keywords: ["a1020", "1020", "ac1020"] },
  { type: "Aço Carbono 1045", codes: ["A1045", "AC1045", "1045"], norm: "ABNT NBR 6646 / SAE 1045", application: "Rodas dentadas, eixos, pinos", color: "bg-orange-100 text-orange-700 dark:bg-orange-900/30 dark:text-orange-400", keywords: ["a1045", "1045", "ac1045"] },
  { type: "Aço Carbono J429 (Grau 5/8)", codes: ["J429", "SAE J429"], norm: "SAE J429", application: "Parafusos e fixadores de alta resistência", color: "bg-orange-100 text-orange-700 dark:bg-orange-900/30 dark:text-orange-400", keywords: ["j429"] },
  { type: "Borracha Nitrílica (NBR)", codes: ["NBR"], norm: "Elastômero", application: "Retentores, anéis O-ring, diafragmas", color: "bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400", keywords: ["nbr"] },
  { type: "PTFE (Teflon)", codes: ["PTFE"], norm: "Polímero", application: "Vedações, fitas de vedação", color: "bg-purple-100 text-purple-700 dark:bg-purple-900/30 dark:text-purple-400", keywords: ["ptfe"] },
  { type: "Ferro Fundido Cinzento (GG)", codes: ["GG", "FOFO", "GGQ"], norm: "ABNT NBR 6589", application: "Grelhas, polias, conexões", color: "bg-slate-100 text-slate-700 dark:bg-slate-900/30 dark:text-slate-400", keywords: ["fofo", "ferro fundido", "ggq", "ggg40"] }
];

function showErrorModal() {
    const modal = document.getElementById('errorModal');
    const content = document.getElementById('errorModalContent');
    modal.classList.remove('hidden');
    setTimeout(() => {
        modal.classList.remove('opacity-0');
        content.classList.remove('scale-95');
        content.classList.add('scale-100');
    }, 10);
    if (typeof lucide !== 'undefined') lucide.createIcons();
}

function closeErrorModal() {
    const modal = document.getElementById('errorModal');
    modal.classList.add('opacity-0');
    setTimeout(() => modal.classList.add('hidden'), 300);
}

function toggleTheme() {
    const isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
}

function init() {
    // Load theme
    if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
    }
    renderTable(MATERIALS);
    lucide.createIcons();
    const urlParams = new URLSearchParams(window.location.search);
    const query = urlParams.get('q');
    if (query) {
        document.getElementById('searchInput').value = query;
        identify();
    }
}

function renderTable(data) {
    const tbody = document.getElementById('refTable');
    tbody.innerHTML = data.map(m => `
        <tr class="hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
            <td class="px-6 py-4 font-mono font-bold ${m.color}">${m.codes[0]}</td>
                <td class="px-6 py-4">
                    <span class="font-black uppercase tracking-wider ${m.color}">
                        ${m.type}
                    </span>
                </td>
            <td class="px-6 py-4 text-slate-500 dark:text-slate-400">${m.norm}</td>
            <td class="px-6 py-4 text-slate-500 dark:text-slate-400">${m.application}</td>
        </tr>
    `).join('');
}

function identify() {
    const input = document.getElementById('searchInput').value.trim().toLowerCase();
    if (!input) return;

    const resultCard = document.getElementById('resultCard');
    const resultType = document.getElementById('resultType');
    const resultDesc = document.getElementById('resultDesc');
    const resultBadges = document.getElementById('resultBadges');

    const normalized = input.replace(/[^a-z0-9\/]/g, '');
    let bestMatch = null;
    let maxScore = 0;

    MATERIALS.forEach(m => {
        let score = 0;
        m.codes.forEach(c => {
            const cn = c.toLowerCase().replace(/[^a-z0-9\/]/g, '');
            if (normalized === cn) score += 10;
            else if (normalized.includes(cn) || cn.includes(normalized)) score += 5;
        });
        m.keywords.forEach(k => {
            if (input.includes(k)) score += 3;
        });

        if (score > maxScore) {
            maxScore = score;
            bestMatch = m;
        }
    });

    if (bestMatch && maxScore >= 5) {
        resultCard.classList.remove('hidden');
        resultType.textContent = bestMatch.type;
        resultDesc.textContent = bestMatch.application;
        
        resultBadges.innerHTML = `
            <span class="px-4 py-1.5 rounded-xl bg-indigo-100 text-indigo-700 dark:bg-indigo-900/50 dark:text-indigo-300 font-black text-xs uppercase tracking-widest border border-indigo-200 dark:border-indigo-800">
                Norma: ${bestMatch.norm}
            </span>
            ${bestMatch.codes.map(c => `
                <span class="px-4 py-1.5 rounded-xl ${bestMatch.color} bg-current bg-opacity-10 font-mono text-xs font-bold border border-current border-opacity-10">
                    ${c}
                </span>
            `).join('')}
        `;

        // Filter table to show related
        renderTable([bestMatch]);
    } else {
        resultCard.classList.add('hidden');
        renderTable(MATERIALS);
        showErrorModal();
    }
}

// Listen for Enter key
document.getElementById('searchInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') identify();
});

const searchInput = document.getElementById('searchInput');
const clearSearchBtn = document.getElementById('clearSearch');

searchInput.addEventListener('input', (e) => {
    const val = e.target.value.trim();
    clearSearchBtn.classList.toggle('hidden', val === '');
    
    if (val === '') {
        document.getElementById('resultCard').classList.add('hidden');
        renderTable(MATERIALS);
    }
});

clearSearchBtn.addEventListener('click', () => {
    searchInput.value = '';
    clearSearchBtn.classList.add('hidden');
    document.getElementById('resultCard').classList.add('hidden');
    renderTable(MATERIALS);
    searchInput.focus();
});

init();
</script>
</body>
</html>
